name: Daily Outreach Engine — AI50M

on:
  schedule:
    - cron: '0 13 * * 1-5'  # 9am ET (Mon-Fri)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no WhatsApp sends)?'
        required: false
        default: 'false'

jobs:
  outreach:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run daily outreach
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WASENDER_API_KEY: ${{ secrets.WASENDER_API_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: node scripts/daily-outreach.js

      - name: Save dedup state
        run: |
          git config user.email "rey@ai50m.com"
          git config user.name "AI50M Outreach Bot"
          git add data/searched-businesses.json
          git diff --staged --quiet || git commit -m "outreach: $(date +%Y-%m-%d) — dedup update"
          git push
