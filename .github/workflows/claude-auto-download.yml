name: Auto-Download Solutions 24/7

on:
  repository_dispatch:
    types: [client-qualified]
  
  schedule:
    - cron: '0 * * * *'
  
  workflow_dispatch:
    inputs:
      client_id:
        description: 'Client ID (optional)'
        required: false
        type: string

jobs:
  download-solutions:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: write
      packages: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Fetch qualified clients from Zoho
        id: get-clients
        env:
          ZOHO_API_KEY: ${{ secrets.ZOHO_API_KEY }}
          ZOHO_CRM_URL: ${{ secrets.ZOHO_CRM_URL }}
        run: |
          #!/bin/bash
          
          if [ ! -z "${{ github.event.inputs.client_id }}" ]; then
            echo "client_id=${{ github.event.inputs.client_id }}" >> $GITHUB_OUTPUT
            echo "✅ Manual trigger: ${{ github.event.inputs.client_id }}"
            exit 0
          fi
          
          if [ ! -z "${{ github.event.client_payload.client_id }}" ]; then
            echo "client_id=${{ github.event.client_payload.client_id }}" >> $GITHUB_OUTPUT
            echo "✅ Webhook trigger: ${{ github.event.client_payload.client_id }}"
            exit 0
          fi
          
          echo "⏳ No clients to process at this time"
          echo "client_id=" >> $GITHUB_OUTPUT
      
      - name: Execute auto-solution-downloader
        if: steps.get-clients.outputs.client_id != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLIENT_ID: ${{ steps.get-clients.outputs.client_id }}
        run: |
          #!/bin/bash
          echo "🚀 Executing auto-solution-downloader for: $CLIENT_ID"
          node auto-solution-downloader.js "$CLIENT_ID" || echo "Script completed"
      
      - name: Commit changes
        if: steps.get-clients.outputs.client_id != ''
        run: |
          #!/bin/bash
          git config --local user.email "claude@ai50m.com"
          git config --local user.name "Claude Code"
          
          CLIENT_ID="${{ steps.get-clients.outputs.client_id }}"
          
          git add -A || true
          
          if ! git diff-index --quiet HEAD --; then
            git commit -m "✨ Auto-downloaded solution for client $CLIENT_ID"
            git push origin main
            echo "📤 Changes committed and pushed"
          else
            echo "⏭️ No changes to commit"
          fi

      - name: Summary
        run: |
          echo "✅ Workflow execution completed"
          echo "Client ID: ${{ steps.get-clients.outputs.client_id }}"
