name: ai-system pipeline 24/7

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run job boards'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install

      - name: Run AI pipeline
        env:
          GITHUB_TOKEN:      ${{ secrets.GH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          N8N_API_URL:       ${{ secrets.N8N_API_URL }}
          N8N_API_KEY:       ${{ secrets.N8N_API_KEY }}
        run: node agent-runner.js

      - name: Run 360 Job Boards Pipeline
        env:
          APIFY_API_TOKEN:    ${{ secrets.APIFY_API_TOKEN }}
          SMARTLEAD_API_KEY:  ${{ secrets.SMARTLEAD_API_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          ZOHO_ACCESS_TOKEN:  ${{ secrets.ZOHO_ACCESS_TOKEN }}
          ZOHO_REFRESH_TOKEN: ${{ secrets.ZOHO_REFRESH_TOKEN }}
          ZOHO_CLIENT_ID:     ${{ secrets.ZOHO_CLIENT_ID }}
          ZOHO_CLIENT_SECRET: ${{ secrets.ZOHO_CLIENT_SECRET }}
          ZOHO_DOMAIN:        ${{ secrets.ZOHO_DOMAIN }}
          GCLOUD_PROJECT_ID:  ${{ secrets.GCLOUD_PROJECT_ID }}
          SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
          MIN_OUTREACH_SCORE: '45'
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            node job-boards/pipeline.js --dry-run
          else
            node job-boards/pipeline.js
          fi

      - name: Commit outputs and logs
        run: |
          git config user.name  "ai50m-bot"
          git config user.email "bot@ai50m.com"
          git add outputs/ logs/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: pipeline $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
          git push || true

      - name: Status
        if: always()
        run: node status.js
